name: Amazonランキングスクレイパー

on:
  schedule:
    # 毎日 01:00 UTC = 日本時間 10:00
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存関係インストール
        run: npm ci

      - name: Playwrightインストール
        run: npx playwright install --with-deps chromium

      - name: スクレイパー実行
        run: node scrape.js
