name: Amazonランキングスクレイパー

on:
  schedule:
    # 毎日 01:00 UTC = 日本時間 10:00 JST
    - cron: '0 1 * * *'

  # 手動実行
  workflow_dispatch:

concurrency:
  group: scrape-daily
  cancel-in-progress: true

jobs:
  keyword-search:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run keyword search scraper
        run: node scrape.js

  ranking-brand-detect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run ranking brand-detect scraper
        run: node ranking_scraper.js
