name: Amazonランキングスクレイパー

on:
  schedule:
    - cron: "0 1 * * *"  # 毎日 01:00 UTC = JST 10:00
  workflow_dispatch:

# ★これ重要（重複防止）
concurrency:
  group: amazon-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存インストール
        run: npm ci

      - name: Playwrightインストール
        run: npx playwright install --with-deps chromium

      - name: スクレイパー実行
        run: node scrape.js
