name: Amazonランキングスクレイパー

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 10:00 JST
  workflow_dispatch:

concurrency:
  group: amazon-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scrape.js
